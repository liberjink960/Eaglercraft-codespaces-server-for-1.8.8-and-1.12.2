[servers]
v1_8_8 = "127.0.0.1:25566"
v1_12_2 = "127.0.0.1:25567"

# Which server players join first
try = ["v1_8_8"]

# Where players go if their server goes down
fallback = "v1_8_8"

[forced-hosts]
"*" = ["v1_8_8", "v1_12_2"]

[query]
enabled = true
port = 25565

[advanced]
compression-threshold = 256
compression-level = -1
login-ratelimit = 300
connection-timeout = 5000
read-timeout = 30000

# Eaglercraft uses offline-mode UUIDs
player-info-forwarding-mode = "none"
